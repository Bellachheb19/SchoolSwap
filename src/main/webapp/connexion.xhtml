<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — SchoolSwap</title>
    <meta name="description" content="Connectez-vous à SchoolSwap pour acheter et vendre vos matériaux scolaires d'occasion."/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <h:outputStylesheet library="css" name="schoolswap.css"/>
</h:head>

<h:body>

    <div class="auth-page">
        <div class="auth-card">

            <!-- En-tête -->
            <div class="auth-card-header">
                <div class="auth-logo">🎒</div>
                <h1 class="auth-title">Bon retour !</h1>
                <p class="auth-subtitle">Connectez-vous à <span class="auth-brand-name">SchoolSwap</span></p>
            </div>

            <!-- Corps -->
            <div class="auth-card-body">

                <h:form id="loginForm">

                    <div class="form-group">
                        <label class="form-label" for="email">
                            <span class="form-label-icon">✉️</span> Adresse e-mail
                        </label>
                        <h:inputText id="email"
                                     styleClass="form-control"
                                     value="#{loginBean.email}"
                                     required="true"
                                     requiredMessage="Email obligatoire"/>
                        <h:message for="email" styleClass="form-error"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">
                            <span class="form-label-icon">🔒</span> Mot de passe
                        </label>
                        <h:inputSecret id="password"
                                       styleClass="form-control"
                                       value="#{loginBean.password}"
                                       required="true"
                                       requiredMessage="Mot de passe obligatoire"/>
                        <h:message for="password" styleClass="form-error"/>
                    </div>

                    <h:panelGroup rendered="#{not empty loginBean.message}">
                        <div class="alert alert-error">
                            ⚠️ <h:outputText value="#{loginBean.message}"/>
                        </div>
                    </h:panelGroup>

                    <h:commandButton styleClass="btn btn-primary btn-full btn-lg"
                                     value="Se connecter →"
                                     action="#{loginBean.login}"/>

                </h:form>

            </div>

            <!-- Pied de page -->
            <div class="auth-card-footer">
                Pas encore de compte ?
                <h:link value=" S'inscrire gratuitement" outcome="inscription.xhtml"/>
            </div>

        </div>
    </div>

</h:body>
</html>
